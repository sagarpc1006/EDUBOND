<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduBond – Profile</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-page { max-width: 860px; margin: 0 auto; padding: 24px; }
    .profile-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 20px; }
    .profile-cover { height: 160px; background: linear-gradient(135deg, #2563eb, #7c3aed); position: relative; }
    .profile-cover-edit { position: absolute; bottom: 12px; right: 12px; }
    .profile-body { padding: 0 24px 24px; }
    .profile-top { display: flex; align-items: flex-end; justify-content: space-between; margin-top: -48px; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .profile-avatar-wrap { position: relative; }
    .profile-avatar { width: 96px; height: 96px; border-radius: 50%; border: 4px solid var(--surface); background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; font-family: var(--font-head); overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-upload-btn { position: absolute; bottom: 2px; right: 2px; width: 28px; height: 28px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; border: 2px solid var(--surface); }
    .profile-name { font-size: 22px; font-family: var(--font-head); font-weight: 800; }
    .profile-tag { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .profile-email { font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 4px; }
    .profile-stats { display: flex; gap: 24px; margin-top: 16px; padding: 16px 0; border-top: 1px solid var(--border); }
    .pstat { text-align: center; }
    .pstat .n { font-size: 22px; font-weight: 800; font-family: var(--font-head); color: var(--primary); }
    .pstat .l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .skill-chip { padding: 5px 14px; background: var(--primary-light); color: var(--primary); border-radius: 99px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .skill-chip .remove { cursor: pointer; opacity: 0.6; font-size: 14px; }
    .skill-chip .remove:hover { opacity: 1; }
    .profile-section { margin-bottom: 20px; }
    .section-head { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px; }
    .add-skill-form { display: flex; gap: 8px; margin-top: 8px; }
    .connection-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .connection-card:last-child { border-bottom: none; }
    /* Edit fields */
    .editable-field { display: flex; align-items: flex-start; gap: 8px; }
    .editable-field textarea, .editable-field input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-body); font-size: 14px; outline: none; resize: vertical; }
    .editable-field textarea:focus, .editable-field input:focus { border-color: var(--primary); }
    .badge-year { background: #dbeafe; color: #1d4ed8; }
    .badge-branch { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
<div class="main-content-full">
  <div class="profile-page">

    <div class="profile-card">
      <div class="profile-cover" id="profileCover">
        <div class="profile-cover-edit">
          <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)" onclick="changeCoverColor()" id="coverColorBtn">🎨 Cover</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)" onclick="document.getElementById('coverInput').click()" id="coverUploadBtn">🖼️ Upload Cover</button>
          <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)" />
        </div>
      </div>
      <div class="profile-body">
        <div class="profile-top">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profileAvatarDisplay">U</div>
            <div class="avatar-upload-btn" id="avatarUploadBtn" title="Change photo" onclick="document.getElementById('avatarInput').click()">📷</div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)" />
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap" id="profileActionBtns">
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('avatarInput').click()" id="uploadPhotoBtn">🖼️ Upload Photo</button>
            <button class="btn btn-primary btn-sm" onclick="toggleEdit()" id="editBtn">✏️ Edit Profile</button>
            <button class="btn btn-outline btn-sm" onclick="Auth.logout()" id="profileLogoutBtn">🚪 Logout</button>
          </div>
        </div>

        <div id="profileViewMode">
          <div class="profile-name" id="viewName">User</div>
          <div class="profile-tag" id="viewTag">CSE • 3rd Year • Indira ICEM</div>
          <div class="profile-email" id="viewEmail">user@indiraicem.ac.in</div>
          <div style="margin-top:12px;font-size:14px;line-height:1.7;color:var(--text-muted)" id="viewBio">Add a bio to describe yourself, your interests, projects and goals...</div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap" id="viewSkills"></div>
          <div class="profile-stats">
            <div class="pstat"><div class="n" id="profileConnectionsCount">0</div><div class="l">Connections</div></div>
            <div class="pstat"><div class="n" id="profilePostsCount">0</div><div class="l">Posts</div></div>
            <div class="pstat"><div class="n" id="profileNotesCount">0</div><div class="l">Notes</div></div>
            <div class="pstat"><div class="n" id="profileListingsCount">0</div><div class="l">Listings</div></div>
          </div>
        </div>

        <div id="profileEditMode" class="hidden">
          <div class="profile-section">
            <div class="section-head">Full Name</div>
            <input class="input-field" id="editName" placeholder="Your full name" />
          </div>
          <div class="grid-2" style="gap:12px;margin-bottom:16px">
            <div>
              <div class="section-head">Year</div>
              <select class="input-field" id="editYear">
                <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option><option>Alumni</option>
              </select>
            </div>
            <div>
              <div class="section-head">Branch</div>
              <select class="input-field" id="editBranch">
                <option>CSE</option><option>AI & DS</option><option>IT</option><option>ECE</option><option>EE</option><option>ME</option><option>CE</option><option>CH</option>
              </select>
            </div>
          </div>
          <div class="profile-section">
            <div class="section-head">Bio / Description</div>
            <textarea class="input-field" id="editBio" style="min-height:100px;resize:vertical" placeholder="Describe your skills, projects, interests..."></textarea>
          </div>
          <div class="profile-section">
            <div class="section-head">Skills / Interests</div>
            <div class="skills-wrap" id="editSkillsList"></div>
            <div class="add-skill-form">
              <input class="input-field" id="newSkill" placeholder="Add skill (e.g. Python, React)" style="max-width:240px" />
              <button class="btn btn-primary btn-sm" onclick="addSkill()">+ Add</button>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:8px">
            <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
            <button class="btn btn-outline" onclick="toggleEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Connections -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h4>🤝 Connections</h4>
        <span class="badge badge-primary">48 Connected</span>
      </div>
      <div id="connectionsList">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="utils.js"></script>
<script>
  const user = Auth.requireAuth();
  buildNav('');

  function profileStorageKey(email) {
    return `edubond_profile_${(email || '').toLowerCase()}`;
  }

  function authHeader() {
    const token = localStorage.getItem('edubond_access') || '';
    return token ? { Authorization: `Bearer ${token}` } : {};
  }

  async function apiJSON(url, options = {}) {
    const headers = { ...(options.headers || {}), ...authHeader() };
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      showToast('Session expired. Please login again.', 'warning');
      Auth.logout();
      throw new Error('Unauthorized');
    }
    const isJson = (res.headers.get('content-type') || '').includes('application/json');
    const data = isJson ? await res.json() : null;
    if (!res.ok) throw new Error(data?.error || data?.detail || 'Request failed');
    return data;
  }

  const viewedRef = sessionStorage.getItem('viewProfile');
  sessionStorage.removeItem('viewProfile');
  let selectedPerson = null;
  let isViewingOther = false;

  let profileData = {
    name: user.name,
    email: user.email,
    year: user.year,
    branch: user.branch,
    bio: '',
    skills: [],
    avatar: user.avatar || '',
    coverImage: '',
    coverStyle: 'linear-gradient(135deg, #2563eb, #7c3aed)'
  };

  const COVER_COLORS = [
    'linear-gradient(135deg, #2563eb, #7c3aed)',
    'linear-gradient(135deg, #059669, #0d9488)',
    'linear-gradient(135deg, #dc2626, #db2777)',
    'linear-gradient(135deg, #d97706, #65a30d)',
    'linear-gradient(135deg, #0ea5e9, #6366f1)',
  ];
  let coverIdx = 0;

  function normalizeViewedPerson(person) {
    if (!person) return null;
    return {
      name: person.name || [person.first_name, person.last_name].filter(Boolean).join(' ') || person.email || 'User',
      email: (person.email || '').toLowerCase(),
      year: person.year || '3rd Year',
      branch: person.branch || 'CSE',
      bio: person.bio || '',
      skills: Array.isArray(person.skills) ? person.skills : [],
      avatar: person.avatar || person.profile_pic || '',
      coverImage: person.coverImage || person.cover_image || '',
      coverStyle: person.coverStyle || 'linear-gradient(135deg, #2563eb, #7c3aed)'
    };
  }

  async function resolveViewedProfile() {
    if (!viewedRef) return;
    const ref = viewedRef.toLowerCase();
    if (ref === (user.email || '').toLowerCase() || ref === (user.name || '').toLowerCase()) return;

    const localMatch = PEOPLE.find(p =>
      (p.email || '').toLowerCase() === ref || (p.name || '').toLowerCase() === ref
    );

    let resolved = normalizeViewedPerson(localMatch);
    try {
      const rows = await apiJSON(`/api/auth/people/?q=${encodeURIComponent(viewedRef)}`, { method: 'GET' });
      const exact = (Array.isArray(rows) ? rows : []).find(p =>
        (p.email || '').toLowerCase() === ref ||
        (p.name || '').toLowerCase() === ref ||
        (p.username || '').toLowerCase() === ref
      );
      if (exact) resolved = normalizeViewedPerson(exact);
    } catch (_err) {
      // Keep local fallback if API lookup fails.
    }

    if (!resolved || !resolved.email) return;
    selectedPerson = resolved;
    isViewingOther = resolved.email !== (user.email || '').toLowerCase();
    profileData = JSON.parse(localStorage.getItem(profileStorageKey(resolved.email)) || 'null') || resolved;
  }

  function changeCoverColor() {
    coverIdx = (coverIdx + 1) % COVER_COLORS.length;
    profileData.coverImage = '';
    profileData.coverStyle = COVER_COLORS[coverIdx];
    document.getElementById('profileCover').style.background = profileData.coverStyle;
    if (!isViewingOther) {
      localStorage.setItem(profileStorageKey(profileData.email), JSON.stringify(profileData));
    }
  }

  function renderProfile() {
    const coverEl = document.getElementById('profileCover');
    if (profileData.coverImage) {
      coverEl.style.background = `url(${profileData.coverImage}) center/cover`;
    } else {
      coverEl.style.background = profileData.coverStyle || COVER_COLORS[0];
    }

    const avatarEl = document.getElementById('profileAvatarDisplay');
    const initials = profileData.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    if (profileData.avatar) {
      avatarEl.textContent = '';
      avatarEl.style.background = `url(${profileData.avatar}) center/cover`;
    } else {
      avatarEl.textContent = initials;
      avatarEl.style.background = '';
    }

    document.getElementById('viewName').textContent = profileData.name;
    document.getElementById('viewTag').textContent = `${profileData.branch} • ${profileData.year} • Indira ICEM`;
    document.getElementById('viewEmail').textContent = profileData.email;
    document.getElementById('viewBio').textContent = profileData.bio || 'Add a bio to describe yourself, your interests, projects and goals...';
    document.getElementById('viewSkills').innerHTML = profileData.skills.map(s =>
      `<span class="badge badge-primary">${s}</span>`
    ).join('');

    if (isViewingOther) {
      document.getElementById('editBtn').textContent = '👁️ View Only';
      document.getElementById('editBtn').disabled = true;
      document.getElementById('editBtn').style.opacity = '0.6';
      document.getElementById('profileLogoutBtn').style.display = 'none';
      document.getElementById('avatarUploadBtn').style.display = 'none';
      document.getElementById('uploadPhotoBtn').style.display = 'none';
      document.getElementById('avatarInput').style.display = 'none';
      document.getElementById('coverColorBtn').style.display = 'none';
      document.getElementById('coverUploadBtn').style.display = 'none';
      document.getElementById('coverInput').style.display = 'none';
    }
  }

  function toggleEdit() {
    if (isViewingOther) return;
    const isEdit = !document.getElementById('profileEditMode').classList.contains('hidden');
    document.getElementById('profileViewMode').classList.toggle('hidden', !isEdit);
    document.getElementById('profileEditMode').classList.toggle('hidden', isEdit);
    document.getElementById('editBtn').textContent = isEdit ? '✏️ Edit Profile' : '← Cancel';

    if (!isEdit) {
      document.getElementById('editName').value = profileData.name;
      document.getElementById('editYear').value = profileData.year;
      document.getElementById('editBranch').value = profileData.branch;
      document.getElementById('editBio').value = profileData.bio;
      renderEditSkills();
    }
  }

  function renderEditSkills() {
    document.getElementById('editSkillsList').innerHTML = profileData.skills.map((s, i) =>
      `<div class="skill-chip">${s}<span class="remove" onclick="removeSkill(${i})">×</span></div>`
    ).join('');
  }

  function addSkill() {
    const val = document.getElementById('newSkill').value.trim();
    if (!val) return;
    if (profileData.skills.includes(val)) { showToast('Skill already added!', 'warning'); return; }
    profileData.skills.push(val);
    document.getElementById('newSkill').value = '';
    renderEditSkills();
  }

  function removeSkill(i) {
    profileData.skills.splice(i, 1);
    renderEditSkills();
  }

  function saveProfile() {
    if (isViewingOther) return;
    profileData.name = document.getElementById('editName').value.trim() || profileData.name;
    profileData.year = document.getElementById('editYear').value;
    profileData.branch = document.getElementById('editBranch').value;
    profileData.bio = document.getElementById('editBio').value.trim();
    apiJSON('/api/auth/profile/', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: profileData.name,
        year: profileData.year,
        branch: profileData.branch,
        bio: profileData.bio,
        skills: profileData.skills
      })
    }).then(() => {
      localStorage.setItem(profileStorageKey(profileData.email), JSON.stringify(profileData));
      const u = Auth.getUser();
      Auth.setUser({ ...u, name: profileData.name, year: profileData.year, branch: profileData.branch, avatar: profileData.avatar || '' });
      renderProfile();
      toggleEdit();
      showToast('Profile updated! 🎉', 'success');
    }).catch(err => showToast(err.message, 'error'));
  }

  function uploadAvatar(input) {
    if (isViewingOther) return;
    if (!input.files.length) return;
    const file = input.files[0];
    if (!file.type.startsWith('image/')) {
      showToast('Please select a valid image file', 'error');
      input.value = '';
      return;
    }
    if (file.size > 8 * 1024 * 1024) {
      showToast('Image too large. Please use an image under 8MB.', 'error');
      input.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxSize = 512;
        const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);

        const fileToSend = dataURLToFile(dataUrl, `avatar_${Date.now()}.jpg`);
        const form = new FormData();
        form.append('profile_pic', fileToSend);
        fetch('/api/auth/profile/', { method: 'PATCH', headers: { ...authHeader() }, body: form })
          .then(async (res) => {
            if (res.status === 401) { Auth.logout(); throw new Error('Unauthorized'); }
            if (!res.ok) {
              let d = {};
              try { d = await res.json(); } catch {}
              throw new Error(d.error || d.detail || 'Upload failed');
            }
            const d = await res.json();
            profileData.avatar = d.profile_pic || dataUrl;
            localStorage.setItem(profileStorageKey(profileData.email), JSON.stringify(profileData));
            const u = Auth.getUser() || {};
            Auth.setUser({ ...u, avatar: profileData.avatar, name: d.name || u.name, year: d.year || u.year, branch: d.branch || u.branch });
            renderProfile();
            showToast('Profile photo updated!', 'success');
          })
          .catch(err => showToast(err.message, 'error'))
          .finally(() => { input.value = ''; });
      };
      img.onerror = () => {
        showToast('Could not read image file.', 'error');
        input.value = '';
      };
      img.src = reader.result;
    };
    reader.onerror = () => {
      showToast('Could not read image file.', 'error');
      input.value = '';
    };
    reader.readAsDataURL(file);
  }

  function uploadCover(input) {
    if (isViewingOther) return;
    if (!input.files.length) return;
    const file = input.files[0];
    if (!file.type.startsWith('image/')) {
      showToast('Please select a valid image file', 'error');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 1200;
        const maxH = 400;
        const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        const fileToSend = dataURLToFile(dataUrl, `cover_${Date.now()}.jpg`);
        const form = new FormData();
        form.append('cover_image', fileToSend);
        fetch('/api/auth/profile/', { method: 'PATCH', headers: { ...authHeader() }, body: form })
          .then(async (res) => {
            if (res.status === 401) { Auth.logout(); throw new Error('Unauthorized'); }
            if (!res.ok) {
              let d = {};
              try { d = await res.json(); } catch {}
              throw new Error(d.error || d.detail || 'Upload failed');
            }
            const d = await res.json();
            profileData.coverImage = d.cover_image || dataUrl;
            localStorage.setItem(profileStorageKey(profileData.email), JSON.stringify(profileData));
            renderProfile();
            showToast('Cover image updated!', 'success');
          })
          .catch(err => showToast(err.message, 'error'))
          .finally(() => { input.value = ''; });
      };
      img.onerror = () => {
        showToast('Could not read image file.', 'error');
        input.value = '';
      };
      img.src = reader.result;
    };
    reader.onerror = () => {
      showToast('Could not read image file.', 'error');
      input.value = '';
    };
    reader.readAsDataURL(file);
  }

  function renderConnections() {
    const people = PEOPLE.slice(0, 6);
    document.getElementById('connectionsList').innerHTML = people.map(p => {
      const ini = p.name.split(' ').map(n => n[0]).join('').substring(0, 2);
      return `<div class="connection-card">
        <div class="avatar" style="cursor:pointer" onclick="viewProfile('${p.email}')">${ini}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:14px;cursor:pointer;text-decoration:underline" onclick="viewProfile('${p.email}')">${p.name}</div>
          <div style="font-size:12px;color:var(--text-muted)">${p.year} • ${p.branch}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="openChat('${p.name}','${ini}','','${p.email}')">💬 Message</button>
      </div>`;
    }).join('');
  }

  function dataURLToFile(dataUrl, filename) {
    const arr = dataUrl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) u8arr[n] = bstr.charCodeAt(n);
    return new File([u8arr], filename, { type: mime });
  }

  async function loadOwnProfileFromApi() {
    if (isViewingOther) return;
    try {
      const d = await apiJSON('/api/auth/profile/', { method: 'GET' });
      profileData.name = d.name || profileData.name;
      profileData.email = (d.email || profileData.email || '').toLowerCase();
      profileData.year = d.year || profileData.year;
      profileData.branch = d.branch || profileData.branch;
      profileData.bio = d.bio || '';
      profileData.skills = Array.isArray(d.skills) ? d.skills : [];
      profileData.avatar = d.profile_pic || profileData.avatar || '';
      profileData.coverImage = d.cover_image || profileData.coverImage || '';
      const saved = JSON.parse(localStorage.getItem(profileStorageKey(profileData.email)) || 'null');
      if (!profileData.coverImage && saved?.coverImage) profileData.coverImage = saved.coverImage;
      if (saved?.coverStyle) profileData.coverStyle = saved.coverStyle;
      localStorage.setItem(profileStorageKey(profileData.email), JSON.stringify(profileData));
      const u = Auth.getUser() || {};
      Auth.setUser({ ...u, name: profileData.name, year: profileData.year, branch: profileData.branch, avatar: profileData.avatar });
    } catch (err) {
      showToast(err.message, 'warning');
    }
  }

  async function refreshProfileStats() {
    if (isViewingOther) return;
    try {
      const [me, myPosts, myNotes, myListings] = await Promise.all([
        apiJSON('/api/auth/profile/', { method: 'GET' }),
        apiJSON('/api/community/posts/?mine=1', { method: 'GET' }),
        apiJSON('/api/studyhub/materials/?mine=1', { method: 'GET' }),
        apiJSON('/api/marketplace/listings/?mine=1', { method: 'GET' }),
      ]);
      document.getElementById('profileConnectionsCount').textContent = String(me?.connection_count ?? 0);
      document.getElementById('profilePostsCount').textContent = String(Array.isArray(myPosts) ? myPosts.length : 0);
      document.getElementById('profileNotesCount').textContent = String(Array.isArray(myNotes) ? myNotes.length : 0);
      document.getElementById('profileListingsCount').textContent = String(Array.isArray(myListings) ? myListings.length : 0);
    } catch {
      // ignore transient fetch errors
    }
  }

  (async function init() {
    await resolveViewedProfile();
    if (!isViewingOther) {
      await loadOwnProfileFromApi();
      await refreshProfileStats();
    }
    renderProfile();
    renderConnections();
    if (!isViewingOther) setInterval(refreshProfileStats, 12000);
  })();
</script>
</body>
</html>
